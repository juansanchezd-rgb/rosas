html,body{width:100%;min-height:100vh;background:radial-gradient(ellipse at 50% 30%,#1a0020 0%,#0d000f 60%,#050005 100%);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;font-family:Georgia,serif;overflow-x:hidden}
canvas#bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;padding:18px 8px 30px}

.txt{margin-top:16px;text-align:center}
.l1{font-size:2rem;font-weight:bold;letter-spacing:3px;background:linear-gradient(120deg,#ff9de2,#ffec80,#ff69b4,#d4a8ff,#ffb3e6);background-size:250%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:sg 4s linear infinite,glow 2.5s ease-in-out infinite alternate}
.l2{display:block;font-size:1.3rem;letter-spacing:8px;margin-top:4px;background:linear-gradient(90deg,#d4a8ff,#ff9de2,#ffec80,#a8d4ff);background-size:300%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:sg 5s linear infinite}
@keyframes sg{0%{background-position:0%}100%{background-position:300%}}
@keyframes glow{from{filter:drop-shadow(0 0 6px #ff69b488)}to{filter:drop-shadow(0 0 22px #ff69b4cc) drop-shadow(0 0 44px #d4a8ff55)}}
.star{position:fixed;border-radius:50%;animation:tw var(--d) ease-in-out infinite alternate}
@keyframes tw{from{opacity:.08;transform:scale(.5)}to{opacity:1;transform:scale(1.6)}}
</style>
</head>

<script>
const sc=document.getElementById('starsC');
for(let i=0;i<90;i++){
  const s=document.createElement('div');
  s.className='star';
  const sz=Math.random()*3.5+.8;
  const cols=['#ffcce0','#d4a8ff','#fffacd','#ffb3e6','#c9f0ff','#ffffff','#ffd6ff'];
  const c=cols[Math.floor(Math.random()*cols.length)];
  const d=(Math.random()*3.5+1).toFixed(2)+'s';
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;background:${c};--d:${d};animation-delay:${(Math.random()*4).toFixed(2)}s;`;
  sc.appendChild(s);
}
const cv=document.getElementById('bg'),ctx=cv.getContext('2d');
let W,H,pts=[];
function rsz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
rsz();window.addEventListener('resize',rsz);
const pcols=['#ff69b4','#ffb3d9','#d4a8ff','#fff0a0','#ffcce0','#ffffff','#e0b0ff','#ffc0cb','#ffaadd'];
for(let i=0;i<140;i++){
  pts.push({x:Math.random()*1400,y:Math.random()*900,r:Math.random()*2.8+.5,
    c:pcols[Math.floor(Math.random()*pcols.length)],
    vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,
    a:Math.random(),da:(Math.random()*.022+.004)*(Math.random()<.5?1:-1)});
}
function draw(){
  ctx.clearRect(0,0,W,H);
  for(const p of pts){
    p.x+=p.vx;p.y+=p.vy;p.a+=p.da;
    if(p.a>=1||p.a<=0)p.da=-p.da;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;
    if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    ctx.save();
    ctx.globalAlpha=Math.max(0,Math.min(1,p.a));
    ctx.fillStyle=p.c;ctx.shadowColor=p.c;ctx.shadowBlur=8;
    const r=p.r,r2=r*.38;
    ctx.beginPath();
    ctx.moveTo(p.x,p.y-r);ctx.lineTo(p.x+r2,p.y-r2);
    ctx.lineTo(p.x+r,p.y);ctx.lineTo(p.x+r2,p.y+r2);
    ctx.lineTo(p.x,p.y+r);ctx.lineTo(p.x-r2,p.y+r2);
    ctx.lineTo(p.x-r,p.y);ctx.lineTo(p.x-r2,p.y-r2);
    ctx.closePath();ctx.fill();ctx.restore();
  }
  requestAnimationFrame(draw);
}
draw();
</script>
